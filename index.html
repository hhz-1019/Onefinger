<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>一指清台</title>
  <meta name="description" content="一指清台 - 隔空手势台球游戏，用摄像头追踪手指，隔空击球清台！" />
  <style>
    *, *::before, *::after {
      margin: 0; padding: 0; box-sizing: border-box;
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #0d1117;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
      font-family: "PingFang SC", "Noto Sans SC", "Microsoft YaHei", Arial, sans-serif;
    }

    #gameCanvas {
      display: block;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
    }

    /* Camera preview overlay – positioned by renderer, just needs to exist */
    #cameraVideo {
      position: fixed;
      top: -9999px; left: -9999px;  /* keep off-screen; renderer draws it onto canvas */
      width: 1px; height: 1px;
      opacity: 0;
      pointer-events: none;
    }

    /* Error overlay */
    #errorOverlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.85);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      flex-direction: column;
      gap: 16px;
      color: #fff;
    }
    #errorOverlay .emoji { font-size: 52px; }
    #errorOverlay .msg {
      font-size: 20px;
      text-align: center;
      padding: 0 24px;
      color: #f0c070;
    }
    #errorOverlay button {
      margin-top: 12px;
      padding: 12px 32px;
      background: #3aad5c;
      border: none;
      border-radius: 24px;
      color: #fff;
      font-size: 16px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <canvas id="gameCanvas"></canvas>
  <video id="cameraVideo" autoplay playsinline muted></video>

  <div id="errorOverlay">
    <div class="emoji">😵</div>
    <div class="msg">哎呀，出错了，请重启试试吧~</div>
    <button onclick="location.reload()">重新启动</button>
  </div>

  <!-- Load order matters: config → utils → ball → renderer → camera → game -->
  <script src="./js/config.js"></script>
  <script src="./js/utils.js"></script>
  <script src="./js/ball.js"></script>
  <script src="./js/renderer.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
  <script src="./js/camera.js"></script>
  <script src="./js/game.js"></script>

</body>
</html>
